<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Goals Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="app-container">

        <div class="title-container">
            <h1>Monthly Goals Dashboard</h1>
        </div>

        <div id="dashboard-container"></div>

    </div>

    <div id="add-goal-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 id="modal-header-title">Create New Goal</h2>
            
            <input type="hidden" id="modal-category">
            <input type="hidden" id="modal-color">

            <div class="input-group">
                <label>Goal Title</label>
                <input type="text" id="goal-title-input" placeholder="e.g., Orange Theory, Scuttle Walk">
            </div>

            <div class="input-group">
                <label>Target Number</label>
                <input type="number" id="goal-target-input" placeholder="e.g., 10" step="0.5">
            </div>

            <div class="input-group">
                <label>Unit (Optional)</label>
                <input type="text" id="goal-unit-input" placeholder="e.g., miles, classes">
            </div>

            <div class="modal-actions">
                <button class="btn-modal btn-cancel-modal" onclick="closeModal()">Cancel</button>
                <button class="btn-modal btn-save-modal" id="btn-save-close" onclick="submitNewGoal(false)">Save & Close</button>
            </div>
            <button class="btn-modal btn-save-alt" id="btn-save-add" onclick="submitNewGoal(true)">Save & Add Another</button>
        </div>
    </div>
</body>

</html>
